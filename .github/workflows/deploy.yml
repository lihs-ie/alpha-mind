name: Deploy

run-name: "${{ github.ref_name }} deploy ${{ inputs.service }} to ${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - frontend
          - bff
          - data-collector
          - insight-collector
          - portfolio-planner
          - risk-guard
          - execution
          - audit-log
          - agent-orchestrator
          - feature-engineering
          - signal-generator
          - hypothesis-lab
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stg
          - prod

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-northeast1
  AR_REPOSITORY: alpha-mind-app

jobs:
  prepare:
    name: Prepare Deploy Matrix
    runs-on: ubuntu-latest
    outputs:
      haskell_services: ${{ steps.matrix.outputs.haskell_services }}
      python_services: ${{ steps.matrix.outputs.python_services }}
      deploy_frontend: ${{ steps.matrix.outputs.deploy_frontend }}
      gcp_project_id: ${{ steps.project.outputs.gcp_project_id }}

    steps:
      - name: Determine GCP project ID
        id: project
        run: |
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            echo "gcp_project_id=${GCP_PROJECT_ID_PROD:-alpha-mind-prod}" >> "$GITHUB_OUTPUT"
          else
            echo "gcp_project_id=${GCP_PROJECT_ID_STG:-alpha-mind-stg}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
          GCP_PROJECT_ID_STG: ${{ vars.GCP_PROJECT_ID_STG }}

      - name: Generate service matrix
        id: matrix
        run: |
          ALL_HASKELL='["bff","data-collector","insight-collector","portfolio-planner","risk-guard","execution","audit-log","agent-orchestrator"]'
          ALL_PYTHON='["feature-engineering","signal-generator","hypothesis-lab"]'

          SERVICE="${{ inputs.service }}"

          if [[ "$SERVICE" == "all" ]]; then
            echo "haskell_services=$ALL_HASKELL" >> "$GITHUB_OUTPUT"
            echo "python_services=$ALL_PYTHON" >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
          elif [[ "$SERVICE" == "frontend" ]]; then
            echo 'haskell_services=[]' >> "$GITHUB_OUTPUT"
            echo 'python_services=[]' >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
          elif [[ "$SERVICE" =~ ^(bff|data-collector|insight-collector|portfolio-planner|risk-guard|execution|audit-log|agent-orchestrator)$ ]]; then
            echo "haskell_services=[\"$SERVICE\"]" >> "$GITHUB_OUTPUT"
            echo 'python_services=[]' >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=false" >> "$GITHUB_OUTPUT"
          elif [[ "$SERVICE" =~ ^(feature-engineering|signal-generator|hypothesis-lab)$ ]]; then
            echo 'haskell_services=[]' >> "$GITHUB_OUTPUT"
            echo "python_services=[\"$SERVICE\"]" >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-haskell:
    name: Deploy Haskell (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.haskell_services != '[]'
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.haskell_services) }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.CICD_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.haskell
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run Service
        if: contains(fromJson('["bff","audit-log","portfolio-planner","risk-guard","execution","agent-orchestrator"]'), matrix.service)
        run: |
          gcloud run services update "${{ matrix.service }}" \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ needs.prepare.outputs.gcp_project_id }}"

      - name: Deploy to Cloud Run Job
        if: contains(fromJson('["data-collector","insight-collector"]'), matrix.service)
        run: |
          gcloud run jobs update "${{ matrix.service }}" \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ needs.prepare.outputs.gcp_project_id }}"

  deploy-python:
    name: Deploy Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.python_services != '[]'
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.python_services) }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.CICD_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.python
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run Job
        run: |
          gcloud run jobs update "${{ matrix.service }}" \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ needs.prepare.outputs.gcp_project_id }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.deploy_frontend == 'true'
    environment: ${{ inputs.environment }}

    env:
      SOL_COMMIT: bdc573edcfd50aa455d1b17ca8964cee1a69e443

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.CICD_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.frontend
          build-args: |
            SOL_COMMIT=${{ env.SOL_COMMIT }}
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run Service
        run: |
          gcloud run services update "frontend" \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.gcp_project_id }}/${{ env.AR_REPOSITORY }}/frontend:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ needs.prepare.outputs.gcp_project_id }}"
