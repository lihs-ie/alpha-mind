name: CI Integration

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      has_services: ${{ steps.set-matrix.outputs.has_services }}
      services_json: ${{ steps.set-matrix.outputs.services_json }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Detect file changes
        uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            common:
              - ".github/workflows/ci-integration.yml"
              - "docker/Makefile"
              - "docker/docker-compose.yml"
              - "docker/docker-compose.integration*.yml"
              - "docker/dockerfiles/**"
              - "docker/README.integration.md"
              - "docker/scripts/**"
              - "backend/cabal.project"
              - "backend/pyproject.toml"
              - "backend/**"
              - "!backend/bff/**"
              - "!backend/data-collector/**"
              - "!backend/feature-engineering/**"
              - "!backend/signal-generator/**"
              - "!backend/portfolio-planner/**"
              - "!backend/risk-guard/**"
              - "!backend/execution/**"
              - "!backend/audit-log/**"
              - "!backend/insight-collector/**"
              - "!backend/agent-orchestrator/**"
              - "!backend/hypothesis-lab/**"
            bff:
              - "backend/bff/**"
            data_collector:
              - "backend/data-collector/**"
            feature_engineering:
              - "backend/feature-engineering/**"
            signal_generator:
              - "backend/signal-generator/**"
            portfolio_planner:
              - "backend/portfolio-planner/**"
            risk_guard:
              - "backend/risk-guard/**"
            execution:
              - "backend/execution/**"
            audit_log:
              - "backend/audit-log/**"
            insight_collector:
              - "backend/insight-collector/**"
            agent_orchestrator:
              - "backend/agent-orchestrator/**"
            hypothesis_lab:
              - "backend/hypothesis-lab/**"

      - name: Build service matrix
        id: set-matrix
        run: |
          set -euo pipefail

          all_services=(
            bff
            data-collector
            feature-engineering
            signal-generator
            portfolio-planner
            risk-guard
            execution
            audit-log
            insight-collector
            agent-orchestrator
            hypothesis-lab
          )
          services=()

          if [[ "${{ steps.filter.outputs.common }}" == "true" ]]; then
            services=("${all_services[@]}")
          else
            [[ "${{ steps.filter.outputs.bff }}" == "true" ]] && services+=("bff")
            [[ "${{ steps.filter.outputs.data_collector }}" == "true" ]] && services+=("data-collector")
            [[ "${{ steps.filter.outputs.feature_engineering }}" == "true" ]] && services+=("feature-engineering")
            [[ "${{ steps.filter.outputs.signal_generator }}" == "true" ]] && services+=("signal-generator")
            [[ "${{ steps.filter.outputs.portfolio_planner }}" == "true" ]] && services+=("portfolio-planner")
            [[ "${{ steps.filter.outputs.risk_guard }}" == "true" ]] && services+=("risk-guard")
            [[ "${{ steps.filter.outputs.execution }}" == "true" ]] && services+=("execution")
            [[ "${{ steps.filter.outputs.audit_log }}" == "true" ]] && services+=("audit-log")
            [[ "${{ steps.filter.outputs.insight_collector }}" == "true" ]] && services+=("insight-collector")
            [[ "${{ steps.filter.outputs.agent_orchestrator }}" == "true" ]] && services+=("agent-orchestrator")
            [[ "${{ steps.filter.outputs.hypothesis_lab }}" == "true" ]] && services+=("hypothesis-lab")
          fi

          if [[ ${#services[@]} -eq 0 ]]; then
            echo "has_services=false" >> "$GITHUB_OUTPUT"
            echo 'services_json=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          services_json="$(printf '%s\n' "${services[@]}" | sort -u | jq -R . | jq -cs .)"
          echo "has_services=true" >> "$GITHUB_OUTPUT"
          echo "services_json=${services_json}" >> "$GITHUB_OUTPUT"

  integration-test:
    name: Integration (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services == 'true'
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    env:
      SERVICE: ${{ matrix.service }}
      COMPOSE_PROJECT_NAME: it-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build integration images (cache)
        working-directory: docker
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          set -euo pipefail

          targets=("firestore" "${SERVICE}")
          if [[ "${SERVICE}" == "bff" ]]; then
            targets+=("risk-guard")
          fi

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          compose build --builder "${BUILDX_BUILDER}" "${targets[@]}"

      - name: Start integration stack
        working-directory: docker
        run: |
          set -euo pipefail

          targets=("${SERVICE}")
          if [[ "${SERVICE}" == "bff" ]]; then
            targets+=("risk-guard")
          fi

          docker compose --env-file .env.local \
            -f docker-compose.integration.base.yml \
            -f docker-compose.integration.${SERVICE}.yml \
            -f docker-compose.integration.cache.yml \
            up -d --no-build --remove-orphans "${targets[@]}"

      - name: Wait for services to be ready
        working-directory: docker
        run: |
          set -euo pipefail

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          mapfile -t services < <(compose ps --services)

          for svc in "${services[@]}"; do
            cid="$(compose ps -q "$svc")"
            if [[ -z "$cid" ]]; then
              echo "container id not found: $svc"
              exit 1
            fi

            for i in {1..60}; do
              state="$(docker inspect -f '{{.State.Status}}' "$cid")"
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")"
              exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$cid")"

              if [[ "$svc" == "init" ]]; then
                if [[ "$state" == "exited" && "$exit_code" == "0" ]]; then
                  break
                fi
              elif [[ "$health" != "none" ]]; then
                if [[ "$health" == "healthy" ]]; then
                  break
                fi
              elif [[ "$state" == "running" ]]; then
                break
              fi

              if [[ "$i" == "60" ]]; then
                echo "service not ready: $svc state=$state health=$health exit_code=$exit_code"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Health endpoint smoke test
        working-directory: docker
        run: |
          set -euo pipefail

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          compose exec -T "$SERVICE" sh -lc '
            if command -v curl >/dev/null 2>&1; then
              curl -fsS http://localhost:8080/healthz >/tmp/health.out
            else
              wget -qO- http://localhost:8080/healthz >/tmp/health.out
            fi
            test -s /tmp/health.out
            cat /tmp/health.out
          '

      - name: Collect compose logs
        if: always()
        working-directory: docker
        run: |
          set -euo pipefail
          mkdir -p /tmp/integration-logs/${SERVICE}

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          compose ps -a > /tmp/integration-logs/${SERVICE}/ps.txt || true
          compose logs --no-color > /tmp/integration-logs/${SERVICE}/compose.log || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: integration-logs-${{ matrix.service }}
          path: /tmp/integration-logs/${{ matrix.service }}

      - name: Tear down integration stack
        if: always()
        working-directory: docker
        run: make integration-down SERVICE=${{ matrix.service }}
