name: CI Integration

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      has_services: ${{ steps.set-matrix.outputs.has_services }}
      services_json: ${{ steps.set-matrix.outputs.services_json }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Detect file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            common:
              - ".github/workflows/ci-integration.yml"
              - "docker/Makefile"
              - "docker/docker-compose.yml"
              - "docker/docker-compose.integration.base.yml"
              - "docker/docker-compose.integration.cache.yml"
              - "docker/docker-compose.integration.cache.registry.yml"
              - "docker/dockerfiles/Dockerfile.firestore-emulator"
              - "docker/README.integration.md"
              - "docker/scripts/**"
            haskell_common:
              - "backend/cabal.project"
              - "docker/dockerfiles/Dockerfile.haskell"
            python_common:
              - "backend/pyproject.toml"
              - "docker/dockerfiles/Dockerfile.python"
            bff:
              - "backend/bff/**"
              - "docker/docker-compose.integration.bff.yml"
            data_collector:
              - "backend/data-collector/**"
              - "docker/docker-compose.integration.data-collector.yml"
            feature_engineering:
              - "backend/feature-engineering/**"
              - "docker/docker-compose.integration.feature-engineering.yml"
            signal_generator:
              - "backend/signal-generator/**"
              - "docker/docker-compose.integration.signal-generator.yml"
            portfolio_planner:
              - "backend/portfolio-planner/**"
              - "docker/docker-compose.integration.portfolio-planner.yml"
            risk_guard:
              - "backend/risk-guard/**"
              - "docker/docker-compose.integration.risk-guard.yml"
            execution:
              - "backend/execution/**"
              - "docker/docker-compose.integration.execution.yml"
            audit_log:
              - "backend/audit-log/**"
              - "docker/docker-compose.integration.audit-log.yml"
            insight_collector:
              - "backend/insight-collector/**"
              - "docker/docker-compose.integration.insight-collector.yml"
            agent_orchestrator:
              - "backend/agent-orchestrator/**"
              - "docker/docker-compose.integration.agent-orchestrator.yml"
            hypothesis_lab:
              - "backend/hypothesis-lab/**"
              - "docker/docker-compose.integration.hypothesis-lab.yml"

      - name: Build service matrix
        id: set-matrix
        run: |
          set -euo pipefail

          haskell_services=(
            bff
            data-collector
            portfolio-planner
            risk-guard
            execution
            audit-log
            insight-collector
            agent-orchestrator
          )
          python_services=(
            feature-engineering
            signal-generator
            hypothesis-lab
          )
          all_services=(
            "${haskell_services[@]}"
            "${python_services[@]}"
          )
          services=()

          if [[ "${{ steps.filter.outputs.common }}" == "true" ]]; then
            services=("${all_services[@]}")
          else
            if [[ "${{ steps.filter.outputs.haskell_common }}" == "true" ]]; then
              services+=("${haskell_services[@]}")
            fi

            if [[ "${{ steps.filter.outputs.python_common }}" == "true" ]]; then
              services+=("${python_services[@]}")
            fi

            [[ "${{ steps.filter.outputs.bff }}" == "true" ]] && services+=("bff")
            [[ "${{ steps.filter.outputs.data_collector }}" == "true" ]] && services+=("data-collector")
            [[ "${{ steps.filter.outputs.feature_engineering }}" == "true" ]] && services+=("feature-engineering")
            [[ "${{ steps.filter.outputs.signal_generator }}" == "true" ]] && services+=("signal-generator")
            [[ "${{ steps.filter.outputs.portfolio_planner }}" == "true" ]] && services+=("portfolio-planner")
            [[ "${{ steps.filter.outputs.risk_guard }}" == "true" ]] && services+=("risk-guard")
            [[ "${{ steps.filter.outputs.execution }}" == "true" ]] && services+=("execution")
            [[ "${{ steps.filter.outputs.audit_log }}" == "true" ]] && services+=("audit-log")
            [[ "${{ steps.filter.outputs.insight_collector }}" == "true" ]] && services+=("insight-collector")
            [[ "${{ steps.filter.outputs.agent_orchestrator }}" == "true" ]] && services+=("agent-orchestrator")
            [[ "${{ steps.filter.outputs.hypothesis_lab }}" == "true" ]] && services+=("hypothesis-lab")
          fi

          if [[ ${#services[@]} -eq 0 ]]; then
            echo "has_services=false" >> "$GITHUB_OUTPUT"
            echo 'services_json=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          services_json="$(printf '%s\n' "${services[@]}" | sort -u | jq -R . | jq -cs .)"
          echo "has_services=true" >> "$GITHUB_OUTPUT"
          echo "services_json=${services_json}" >> "$GITHUB_OUTPUT"

  integration-test:
    name: Integration (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services == 'true'
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    env:
      SERVICE: ${{ matrix.service }}
      COMPOSE_PROJECT_NAME: it-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Decide registry cache availability
        id: registry_cache
        run: |
          if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "enable_registry_cache=false" >> "$GITHUB_OUTPUT"
          else
            echo "enable_registry_cache=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR for registry cache
        if: steps.registry_cache.outputs.enable_registry_cache == 'true'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build integration images (cache)
        working-directory: docker
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          ENABLE_REGISTRY_CACHE: ${{ steps.registry_cache.outputs.enable_registry_cache }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p /tmp/integration-logs/${SERVICE}

          targets=("firestore" "${SERVICE}")
          if [[ "${SERVICE}" == "bff" ]]; then
            targets+=("risk-guard")
          fi

          is_haskell_service=false
          case "${SERVICE}" in
            bff|data-collector|portfolio-planner|risk-guard|execution|audit-log|insight-collector|agent-orchestrator)
              is_haskell_service=true
              ;;
          esac

          compose_files=(
            -f docker-compose.integration.base.yml
            -f docker-compose.integration.${SERVICE}.yml
            -f docker-compose.integration.cache.yml
          )

          if [[ "${ENABLE_REGISTRY_CACHE}" == "true" && "${is_haskell_service}" == "true" ]]; then
            export REGISTRY_CACHE_REPO
            REGISTRY_CACHE_REPO="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
            compose_files+=(-f docker-compose.integration.cache.registry.yml)
            echo "Registry cache enabled: ${REGISTRY_CACHE_REPO}/integration-cache:*"
          else
            echo "Registry cache disabled (fork PR or non-Haskell service)."
          fi

          docker compose --env-file .env.local \
            "${compose_files[@]}" \
            build --progress=plain --builder "${BUILDX_BUILDER}" "${targets[@]}" \
            | tee /tmp/integration-logs/${SERVICE}/build.log

      - name: Start integration stack
        working-directory: docker
        run: |
          set -euo pipefail

          targets=("${SERVICE}")
          if [[ "${SERVICE}" == "bff" ]]; then
            targets+=("risk-guard")
          fi

          docker compose --env-file .env.local \
            -f docker-compose.integration.base.yml \
            -f docker-compose.integration.${SERVICE}.yml \
            -f docker-compose.integration.cache.yml \
            up -d --no-build --remove-orphans "${targets[@]}"

      - name: Wait for services to be ready
        working-directory: docker
        run: |
          set -euo pipefail

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          mapfile -t services < <(compose ps --services)

          for svc in "${services[@]}"; do
            cid="$(compose ps -q "$svc")"
            if [[ -z "$cid" ]]; then
              echo "container id not found: $svc"
              exit 1
            fi

            for i in {1..60}; do
              state="$(docker inspect -f '{{.State.Status}}' "$cid")"
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")"
              exit_code="$(docker inspect -f '{{.State.ExitCode}}' "$cid")"

              if [[ "$svc" == "init" ]]; then
                if [[ "$state" == "exited" && "$exit_code" == "0" ]]; then
                  break
                fi
              elif [[ "$health" != "none" ]]; then
                if [[ "$health" == "healthy" ]]; then
                  break
                fi
              elif [[ "$state" == "running" ]]; then
                break
              fi

              if [[ "$i" == "60" ]]; then
                echo "service not ready: $svc state=$state health=$health exit_code=$exit_code"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Health endpoint smoke test
        working-directory: docker
        run: |
          set -euo pipefail

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          compose exec -T "$SERVICE" sh -lc '
            if command -v curl >/dev/null 2>&1; then
              curl -fsS http://localhost:8080/healthz >/tmp/health.out
            else
              wget -qO- http://localhost:8080/healthz >/tmp/health.out
            fi
            test -s /tmp/health.out
            cat /tmp/health.out
          '

      - name: Detect service integration tests
        id: service_integration
        run: |
          set -euo pipefail

          tests_dir="backend/${SERVICE}/tests/integration"
          has_python_integration=false

          if [[ -d "${tests_dir}" ]] && { [[ -f "backend/${SERVICE}/pyproject.toml" ]] || [[ -f "backend/${SERVICE}/requirements.txt" ]]; }; then
            has_python_integration=true
          fi

          echo "has_python_integration=${has_python_integration}" >> "$GITHUB_OUTPUT"

      - name: Setup Python for service integration tests
        if: steps.service_integration.outputs.has_python_integration == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: |
            backend/${{ matrix.service }}/pyproject.toml
            backend/${{ matrix.service }}/requirements.txt

      - name: Install integration test dependencies
        if: steps.service_integration.outputs.has_python_integration == 'true'
        run: |
          set -euo pipefail

          cd "backend/${SERVICE}"
          python -m pip install --upgrade pip
          if [[ -f pyproject.toml ]]; then
            pip install -e ".[dev,integration]"
          elif [[ -f requirements.txt ]]; then
            pip install -r requirements.txt pytest
          else
            echo "No dependency manifest found for ${SERVICE}"
            exit 1
          fi

      - name: Run service integration tests
        if: steps.service_integration.outputs.has_python_integration == 'true'
        run: |
          set -euo pipefail

          compose() {
            docker compose --env-file docker/.env.local \
              -f docker/docker-compose.integration.base.yml \
              -f docker/docker-compose.integration.${SERVICE}.yml \
              -f docker/docker-compose.integration.cache.yml "$@"
          }

          firestore_endpoint="$(compose port firestore 8080 | tail -n 1)"
          pubsub_endpoint="$(compose port pubsub 8085 | tail -n 1)"
          gcs_endpoint="$(compose port gcs 4443 | tail -n 1)"

          if [[ -z "${firestore_endpoint}" || -z "${pubsub_endpoint}" || -z "${gcs_endpoint}" ]]; then
            echo "Failed to resolve emulator ports for ${SERVICE}"
            exit 1
          fi

          export FIRESTORE_EMULATOR_HOST="${firestore_endpoint}"
          export PUBSUB_EMULATOR_HOST="${pubsub_endpoint}"
          export STORAGE_EMULATOR_HOST="http://${gcs_endpoint}"
          export GCP_PROJECT_ID="alpha-mind-local"

          cd "backend/${SERVICE}"
          pytest tests/integration -q

      - name: Collect compose logs
        if: always()
        working-directory: docker
        run: |
          set -euo pipefail
          mkdir -p /tmp/integration-logs/${SERVICE}

          compose() {
            docker compose --env-file .env.local \
              -f docker-compose.integration.base.yml \
              -f docker-compose.integration.${SERVICE}.yml \
              -f docker-compose.integration.cache.yml "$@"
          }

          compose ps -a > /tmp/integration-logs/${SERVICE}/ps.txt || true
          compose logs --no-color > /tmp/integration-logs/${SERVICE}/compose.log || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: integration-logs-${{ matrix.service }}
          path: /tmp/integration-logs/${{ matrix.service }}

      - name: Tear down integration stack
        if: always()
        working-directory: docker
        run: make integration-down SERVICE=${{ matrix.service }}
