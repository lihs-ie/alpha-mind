name: CI Terraform

on:
  pull_request:
    paths:
      - "infrastructure/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - infrastructure/bootstrap
          - infrastructure/platform/envs/stg
          - infrastructure/platform/envs/prod
          - infrastructure/monitoring/envs/stg

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('infrastructure/**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: terraform fmt check
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check -recursive

      - name: terraform init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

  tflint:
    name: TFLint (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - infrastructure/bootstrap
          - infrastructure/platform/envs/stg
          - infrastructure/platform/envs/prod
          - infrastructure/monitoring/envs/stg

    steps:
      - uses: actions/checkout@v6

      - name: Cache tflint plugins
        uses: actions/cache@v5
        with:
          path: ~/.tflint.d/plugins
          key: tflint-plugins-${{ runner.os }}-${{ hashFiles('infrastructure/.tflint.hcl') }}
          restore-keys: |
            tflint-plugins-${{ runner.os }}-

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Init TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --init --config "${{ github.workspace }}/infrastructure/.tflint.hcl"

      - name: Run TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --config "${{ github.workspace }}/infrastructure/.tflint.hcl"

  ci-terraform-result:
    name: CI Terraform Result
    runs-on: ubuntu-latest
    needs: [validate, tflint]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" || "${{ needs.tflint.result }}" == "failure" ]]; then
            echo "CI Terraform failed"
            exit 1
          fi
          echo "CI Terraform passed (or skipped)"
