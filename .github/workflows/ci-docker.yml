name: CI Docker

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      haskell: ${{ steps.filter.outputs.haskell }}
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            haskell:
              - "docker/dockerfiles/Dockerfile.haskell"
              - "backend/bff/**"
              - "backend/audit-log/**"
              - "backend/portfolio-planner/**"
              - "backend/risk-guard/**"
              - "backend/execution/**"
              - "backend/data-collector/**"
              - "backend/insight-collector/**"
              - "backend/agent-orchestrator/**"
            python:
              - "docker/dockerfiles/Dockerfile.python"
              - "backend/feature-engineering/**"
              - "backend/signal-generator/**"
              - "backend/hypothesis-lab/**"
            frontend:
              - "docker/dockerfiles/Dockerfile.frontend"
              - "applications/frontend/**"

  build-haskell-docker:
    name: Build Haskell Docker Image (bff)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.haskell == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (bff — smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.haskell
          build-args: |
            SERVICE_NAME=bff
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-python-docker:
    name: Build Python Docker Image (feature-engineering)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (feature-engineering — smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.python
          build-args: |
            SERVICE_NAME=feature-engineering
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend-docker:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/dockerfiles/Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-docker-result:
    name: CI Docker Result
    runs-on: ubuntu-latest
    needs: [detect-changes, build-haskell-docker, build-python-docker, build-frontend-docker]
    if: always()
    steps:
      - name: Check result
        run: |
          results=("${{ needs.detect-changes.result }}" "${{ needs.build-haskell-docker.result }}" "${{ needs.build-python-docker.result }}" "${{ needs.build-frontend-docker.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI Docker failed"
              exit 1
            fi
          done
          echo "CI Docker passed (or skipped)"
