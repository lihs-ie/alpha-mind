name: CI Python

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - "backend/feature-engineering/**"
              - "backend/signal-generator/**"
              - "backend/hypothesis-lab/**"
              - "backend/pyproject.toml"

  lint-and-format:
    name: Lint and Format (ruff)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check .

  check-and-test:
    name: Check and Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: [feature-engineering, signal-generator, hypothesis-lab]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        working-directory: backend/${{ matrix.service }}
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            pip install mypy pytest -r requirements.txt
          fi

      - name: Type check (mypy)
        working-directory: backend/${{ matrix.service }}
        run: mypy src/

      - name: Test (pytest)
        working-directory: backend/${{ matrix.service }}
        run: pytest

  ci-python-result:
    name: CI Python Result
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-format, check-and-test]
    if: always()
    steps:
      - name: Check result
        run: |
          results=("${{ needs.detect-changes.result }}" "${{ needs.lint-and-format.result }}" "${{ needs.check-and-test.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI Python failed"
              exit 1
            fi
          done
          echo "CI Python passed (or skipped)"
