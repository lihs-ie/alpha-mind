name: CI Frontend

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - "applications/frontend/**"

  build-and-test:
    name: Build and Test (MoonBit / Sol)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'

    env:
      # Sol CLI source commit (mizchi/sol.mbt). Pinned to 3c0377a5 (sol 0.14.1,
      # 2026-04-08): bumps moonbitlang/parser 0.1.16 -> 0.2.5, which removes the
      # manual `impl Show for Report` that conflicted with the auto-derived Show
      # in current MoonBit SDKs ([4051] impl already defined).
      SOL_COMMIT: 3c0377a5f6cd547e7ba49441ae7fad3e57a1dc05
      # moonbitlang/async version override. Every Sol commit (incl. retired
      # origin/main HEAD) pins moonbitlang/async 0.17.0, whose aqueue/cond_var/
      # semaphore modules declare struct constructors via the deprecated
      # `fn new(..)` inside `struct` syntax. The 2026-06 latest MoonBit SDK
      # promotes that deprecation from a warning to a hard error ([3002]), so
      # Sol fails to build from source. async 0.19.0+ replaces it with the
      # required `fn T::T(..)` toplevel form; 0.19.4 is the latest. We override
      # the transitive pin (in both Sol's moon.mod.json and the frontend
      # scaffold) so the MoonBit resolver selects a [3002]-free async on the
      # unpinned latest SDK. The SDK itself cannot be pinned: the CDN serves
      # only `latest` (date-versioned tarballs return 403).
      ASYNC_VERSION: 0.19.4

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: applications/frontend/pnpm-lock.yaml

      - name: Cache MoonBit SDK
        id: cache-moonbit-sdk
        uses: actions/cache@v6
        with:
          path: ~/.moon
          key: moonbit-sdk-${{ runner.os }}

      - name: Install MoonBit SDK
        if: steps.cache-moonbit-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Cache MoonBit packages
        uses: actions/cache@v6
        with:
          path: applications/frontend/.mooncakes
          key: mooncakes-${{ hashFiles('applications/frontend/moon.mod.json') }}
          restore-keys: |
            mooncakes-

      - name: Cache Sol CLI build output
        id: cache-sol-cli
        uses: actions/cache@v6
        with:
          # node_modules must be cached alongside _build: the built cli.js
          # imports runtime deps (e.g. colorette) from references/sol.mbt/
          # node_modules, but the "Clone and build Sol CLI" step (which runs
          # pnpm install) is skipped on a cache hit. Without node_modules the
          # later `sol build` fails with ERR_MODULE_NOT_FOUND on a cache hit.
          path: |
            references/sol.mbt/_build
            references/sol.mbt/node_modules
          key: sol-cli-build-v2-${{ env.SOL_COMMIT }}-async-${{ env.ASYNC_VERSION }}

      - name: Clone and build Sol CLI
        if: steps.cache-sol-cli.outputs.cache-hit != 'true'
        run: |
          git init references/sol.mbt
          cd references/sol.mbt
          git remote add origin https://github.com/mizchi/sol.mbt
          git fetch --depth 1 origin "$SOL_COMMIT"
          git checkout FETCH_HEAD
          # Override the transitive moonbitlang/async pin to a [3002]-free
          # version (see ASYNC_VERSION note above) before resolving deps.
          node -e "const f='moon.mod.json';const d=require('./'+f);d.deps['moonbitlang/async']=process.env.ASYNC_VERSION;require('fs').writeFileSync(f,JSON.stringify(d,null,2)+'\n')"
          pnpm install
          moon update
          moon build --target js

      - name: Install frontend dependencies
        working-directory: applications/frontend
        run: pnpm install

      - name: Update MoonBit dependencies
        working-directory: applications/frontend
        run: moon update

      - name: Type check (moon check)
        working-directory: applications/frontend
        run: moon check --target js

      - name: Build (sol build)
        working-directory: applications/frontend
        run: node ../../references/sol.mbt/_build/js/debug/build/cli/cli.js build

      - name: Test (moon test)
        working-directory: applications/frontend
        run: moon test --target js

  ci-frontend-result:
    name: CI Frontend Result
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-test]
    if: always()
    steps:
      - name: Check result
        run: |
          results=("${{ needs.detect-changes.result }}" "${{ needs.build-and-test.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI Frontend failed"
              exit 1
            fi
          done
          echo "CI Frontend passed (or skipped)"
