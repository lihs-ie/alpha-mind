name: CI Frontend

on:
  pull_request:
    paths:
      - "applications/frontend/**"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test (MoonBit / Sol)
    runs-on: ubuntu-latest

    env:
      SOL_COMMIT: bdc573edcfd50aa455d1b17ca8964cee1a69e443

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: applications/frontend/pnpm-lock.yaml

      - name: Cache MoonBit SDK
        id: cache-moonbit-sdk
        uses: actions/cache@v5
        with:
          path: ~/.moon
          key: moonbit-sdk-${{ runner.os }}

      - name: Install MoonBit SDK
        if: steps.cache-moonbit-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Cache MoonBit packages
        uses: actions/cache@v5
        with:
          path: applications/frontend/.mooncakes
          key: mooncakes-${{ hashFiles('applications/frontend/moon.mod.json') }}
          restore-keys: |
            mooncakes-

      - name: Cache Sol CLI build output
        id: cache-sol-cli
        uses: actions/cache@v5
        with:
          path: references/sol.mbt/_build
          key: sol-cli-build-${{ env.SOL_COMMIT }}

      - name: Clone and build Sol CLI
        if: steps.cache-sol-cli.outputs.cache-hit != 'true'
        run: |
          mkdir -p references
          git clone https://github.com/mizchi/sol.mbt references/sol.mbt
          cd references/sol.mbt
          git checkout "$SOL_COMMIT"
          pnpm install
          moon update
          moon build --target js

      - name: Install frontend dependencies
        working-directory: applications/frontend
        run: pnpm install

      - name: Update MoonBit dependencies
        working-directory: applications/frontend
        run: moon update

      - name: Type check (moon check)
        working-directory: applications/frontend
        run: moon check --target js

      - name: Build (sol build)
        working-directory: applications/frontend
        run: node ../../references/sol.mbt/_build/js/debug/build/cli/cli.js build

      - name: Test (moon test)
        working-directory: applications/frontend
        run: moon test --target js

  ci-frontend-result:
    name: CI Frontend Result
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" ]]; then
            echo "CI Frontend failed"
            exit 1
          fi
          echo "CI Frontend passed (or skipped)"
