name: CI Haskell

on:
  pull_request:
    paths:
      - "backend/**"
      - "!backend/feature-engineering/**"
      - "!backend/signal-generator/**"
      - "!backend/hypothesis-lab/**"
      - "!backend/pyproject.toml"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: "9.12.2"
          cabal-version: "3.16.1.0"

      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: cabal-store-${{ runner.os }}-${{ hashFiles('backend/**/*.cabal', 'backend/cabal.project') }}
          restore-keys: |
            cabal-store-${{ runner.os }}-

      - name: Cache dist-newstyle
        uses: actions/cache@v5
        with:
          path: backend/dist-newstyle
          key: dist-newstyle-${{ runner.os }}-${{ hashFiles('backend/**/*.cabal', 'backend/cabal.project', 'backend/**/*.hs') }}
          restore-keys: |
            dist-newstyle-${{ runner.os }}-${{ hashFiles('backend/**/*.cabal', 'backend/cabal.project') }}-
            dist-newstyle-${{ runner.os }}-

      - name: Build
        working-directory: backend
        run: cabal build all

      - name: Test
        working-directory: backend
        run: cabal test all

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Haskell (for fourmolu)
        uses: haskell-actions/setup@v2
        id: setup-haskell-lint
        with:
          ghc-version: "9.12.2"
          cabal-version: "3.16.1.0"

      - name: Cache cabal store (lint)
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup-haskell-lint.outputs.cabal-store }}
          key: cabal-store-lint-${{ runner.os }}-fourmolu
          restore-keys: |
            cabal-store-lint-${{ runner.os }}-

      - name: Install fourmolu
        run: cabal install fourmolu --installdir=/usr/local/bin --overwrite-policy=always

      - name: Setup HLint
        uses: haskell-actions/hlint-setup@v2

      - name: Run HLint
        uses: haskell-actions/hlint-run@v2
        with:
          path: backend/
          fail-on: warning

      - name: Check formatting (fourmolu)
        working-directory: backend
        run: |
          fourmolu --mode check $(find . -name "*.hs" -not -path "./dist-newstyle/*")

  ci-haskell-result:
    name: CI Haskell Result
    runs-on: ubuntu-latest
    needs: [build-and-test, lint]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" || "${{ needs.lint.result }}" == "failure" ]]; then
            echo "CI Haskell failed"
            exit 1
          fi
          echo "CI Haskell passed (or skipped)"
