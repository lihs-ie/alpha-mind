name: CI Haskell

on:
  pull_request:
    paths:
      - "backend/**"
      - "!backend/feature-engineering/**"
      - "!backend/signal-generator/**"
      - "!backend/hypothesis-lab/**"
      - "!backend/pyproject.toml"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Haskell
        id: setup-haskell
        uses: ./.github/actions/setup-haskell

      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: cabal-store-${{ runner.os }}-${{ hashFiles('backend/**/*.cabal', 'backend/cabal.project') }}
          restore-keys: |
            cabal-store-${{ runner.os }}-

      - name: Cache dist-newstyle
        uses: actions/cache@v5
        with:
          path: backend/dist-newstyle
          key: dist-newstyle-${{ runner.os }}-${{ hashFiles('backend/**/*.cabal', 'backend/cabal.project', 'backend/**/*.hs') }}
          restore-keys: |
            dist-newstyle-${{ runner.os }}-${{ hashFiles('backend/**/*.cabal', 'backend/cabal.project') }}-
            dist-newstyle-${{ runner.os }}-

      - name: Build
        working-directory: backend
        run: cabal build all

      - name: Test
        working-directory: backend
        run: cabal test all

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    env:
      FOURMOLU_VERSION: "0.18.0.0"
      HLINT_VERSION: "3.8"

    steps:
      - uses: actions/checkout@v6

      - name: Cache fourmolu binary
        id: cache-fourmolu
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/fourmolu
          key: fourmolu-${{ runner.os }}-${{ env.FOURMOLU_VERSION }}
          save-always: true

      - name: Cache HLint binary
        id: cache-hlint
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/hlint
          key: hlint-${{ runner.os }}-${{ env.HLINT_VERSION }}
          save-always: true

      - name: Setup Haskell
        if: steps.cache-fourmolu.outputs.cache-hit != 'true'
        id: setup-haskell
        uses: ./.github/actions/setup-haskell

      - name: Cache cabal store (lint)
        if: steps.cache-fourmolu.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: cabal-store-lint-${{ runner.os }}-fourmolu-${{ env.FOURMOLU_VERSION }}
          restore-keys: |
            cabal-store-lint-${{ runner.os }}-fourmolu-
          save-always: true

      - name: Install fourmolu
        if: steps.cache-fourmolu.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          cabal install fourmolu-${{ env.FOURMOLU_VERSION }} --installdir=$HOME/.local/bin --overwrite-policy=always

      - name: Setup HLint
        if: steps.cache-hlint.outputs.cache-hit != 'true'
        uses: haskell-actions/hlint-setup@v2
        with:
          version: ${{ env.HLINT_VERSION }}

      - name: Copy HLint to cache path
        if: steps.cache-hlint.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          cp "$(which hlint)" ~/.local/bin/hlint

      - name: Add tools to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run HLint
        run: hlint backend/ --error=is:Warning --error=is:Suggestion

      - name: Check formatting (fourmolu)
        working-directory: backend
        run: |
          fourmolu --mode check $(find . -name "*.hs" -not -path "./dist-newstyle/*")

  ci-haskell-result:
    name: CI Haskell Result
    runs-on: ubuntu-latest
    needs: [build-and-test, lint]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" || "${{ needs.lint.result }}" == "failure" ]]; then
            echo "CI Haskell failed"
            exit 1
          fi
          echo "CI Haskell passed (or skipped)"
