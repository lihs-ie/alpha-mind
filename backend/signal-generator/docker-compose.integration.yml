version: "3.9"

services:
  firestore-emulator:
    image: google/cloud-sdk:latest
    command: >
      gcloud emulators firestore start
        --host-port=0.0.0.0:8181
        --project=alpha-mind-local
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pubsub-emulator:
    image: google/cloud-sdk:latest
    command: >
      gcloud beta emulators pubsub start
        --host-port=0.0.0.0:8085
        --project=alpha-mind-local
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    command:
      - "-scheme"
      - "http"
      - "-port"
      - "4443"
      - "-external-url"
      - "http://fake-gcs:4443"
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/storage/v1/b"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
