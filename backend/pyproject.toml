[tool.ruff]
target-version = "py314"
line-length = 120
src = ["feature-engineering/src", "signal-generator/src", "hypothesis-lab/src"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.14"
strict = true
warn_return_any = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["lightgbm.*", "sklearn.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
