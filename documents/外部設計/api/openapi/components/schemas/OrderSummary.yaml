type: object
required:
- identifier
- symbol
- side
- qty
- status
- createdAt
properties:
  identifier:
    type: string
    format: uuid
  symbol:
    type: string
  side:
    type: string
    enum:
    - BUY
    - SELL
  qty:
    type: number
  status:
    type: string
    enum:
    - PROPOSED
    - APPROVED
    - REJECTED
    - EXECUTED
    - FAILED
  createdAt:
    type: string
    format: date-time
example:
  identifier: 3fa85f64-5717-4562-b3fc-2c963f66afa6
  symbol: AAPL
  side: BUY
  qty: 1.0
  status: PROPOSED
  createdAt: '2026-01-15T09:00:00Z'
