type: object
required:
- symbol
- startAt
- endAt
- reasonCode
properties:
  symbol:
    type: string
  startAt:
    type: string
    format: date-time
  endAt:
    type: string
    format: date-time
  reasonCode:
    type: string
example:
  symbol: AAPL
  startAt: '2026-01-15T09:00:00Z'
  endAt: '2026-01-15T09:00:00Z'
  reasonCode: MANUAL
