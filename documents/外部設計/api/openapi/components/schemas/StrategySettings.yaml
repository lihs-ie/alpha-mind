type: object
required:
- market
- rebalanceFrequency
- symbols
- dailyLossLimit
- positionConcentrationLimit
- dailyOrderLimit
properties:
  market:
    type: string
    enum:
    - JP
  rebalanceFrequency:
    type: string
    enum:
    - daily
    - weekly
  symbols:
    type: array
    minItems: 1
    items:
      type: string
  dailyLossLimit:
    type: number
    minimum: 0
    maximum: 20
  positionConcentrationLimit:
    type: number
    minimum: 0
    maximum: 50
  dailyOrderLimit:
    type: integer
    minimum: 1
    maximum: 100
example:
  market: JP
  rebalanceFrequency: daily
  symbols:
  - 1306.T
  - 1321.T
  - 1348.T
  - 1475.T
  - 2558.T
  dailyLossLimit: 0.0
  positionConcentrationLimit: 0.0
  dailyOrderLimit: 1
