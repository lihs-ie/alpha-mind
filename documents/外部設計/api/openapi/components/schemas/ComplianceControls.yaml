type: object
required:
- restrictedSymbols
- partnerRestrictedSymbols
- blackoutWindows
- sourcePolicies
- maxCommentLength
properties:
  restrictedSymbols:
    type: array
    items:
      type: string
  partnerRestrictedSymbols:
    type: array
    items:
      type: string
  blackoutWindows:
    type: array
    items:
      "$ref": "./index.yaml#/BlackoutWindow"
  sourcePolicies:
    type: array
    items:
      "$ref": "./index.yaml#/SourcePolicy"
  maxCommentLength:
    type: integer
    minimum: 32
    maximum: 240
    default: 120
  mnpiKeywordVersion:
    type: string
  autoPromotionEnabled:
    type: boolean
    default: false
  updatedAt:
    type: string
    format: date-time
example:
  restrictedSymbols:
  - AAPL
  partnerRestrictedSymbols:
  - 7203.T
  blackoutWindows:
  - symbol: AAPL
    startAt: '2026-01-15T09:00:00Z'
    endAt: '2026-01-15T09:00:00Z'
    actionReasonCode: MANUAL_OPERATION
  sourcePolicies:
  - sourceType: youtube
    enabled: true
    termsVersion: v2026-03
    redistributionAllowed: false
    dailyQuota: 8000
    sourceConfig:
      youtube:
        channelIdentifiers:
        - UCvixJtaXuNdMPUGdOPcY8Ag
        keywordQuery: 日本株 決算
        includeLive: true
        includeComments: true
        maxCommentsPerVideo: 20
        transcriptProvider: none
  maxCommentLength: 120
  autoPromotionEnabled: true
