type: object
required:
- identifier
- email
- role
- permissions
properties:
  identifier:
    type: string
  email:
    type: string
    format: email
  role:
    type: string
    enum:
    - admin
    - viewer
  permissions:
    type: array
    items:
      type: string
example:
  identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
  email: user@example.com
  role: admin
  permissions:
  - string
