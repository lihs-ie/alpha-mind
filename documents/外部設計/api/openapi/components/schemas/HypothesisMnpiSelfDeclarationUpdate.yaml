type: object
required:
- mnpiSelfDeclared
- actionReasonCode
x-compliance-guard:
  mnpiDlpCheck: true
  onDetectionReasonCode: COMPLIANCE_MNPI_SUSPECTED
properties:
  mnpiSelfDeclared:
    type: boolean
    description: MNPIを知らない自己申告状態。昇格時はtrueが必須。
  actionReasonCode:
    "$ref": "./index.yaml#/OperatorActionReasonCode"
  comment:
    "$ref": "./index.yaml#/SafeComment"
example:
  mnpiSelfDeclared: true
  actionReasonCode: MANUAL_OPERATION
  comment: 昇格前に自己申告を更新
