type: object
required:
- identifier
- occurredAt
- eventType
- service
- result
- trace
properties:
  identifier:
    type: string
    pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
  occurredAt:
    type: string
    format: date-time
  eventType:
    type: string
  service:
    type: string
  result:
    type: string
    enum:
    - success
    - failed
  trace:
    type: string
example:
  identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
  occurredAt: '2026-01-15T09:00:00Z'
  eventType: string
  service: string
  result: success
  trace: id-001
