type: object
required:
- identifier
- symbol
- instrumentType
- status
- updatedAt
properties:
  identifier:
    type: string
  symbol:
    type: string
  instrumentType:
    type: string
    enum:
    - ETF
    - STOCK
  status:
    type: string
    enum:
    - draft
    - backtested
    - demo
    - live
    - rejected
  title:
    type: string
  updatedAt:
    type: string
    format: date-time
example:
  identifier: id-001
  symbol: 1306.T
  instrumentType: ETF
  status: draft
  updatedAt: '2026-01-15T09:00:00Z'
