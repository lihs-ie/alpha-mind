type: object
required:
- identifier
- status
- updatedAt
properties:
  identifier:
    type: string
  status:
    type: string
    enum:
    - draft
    - backtested
    - demo
    - live
    - rejected
  title:
    type: string
  updatedAt:
    type: string
    format: date-time
example:
  identifier: id-001
  status: draft
  updatedAt: '2026-01-15T09:00:00Z'
