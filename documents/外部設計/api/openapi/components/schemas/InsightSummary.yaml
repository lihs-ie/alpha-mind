type: object
required:
- identifier
- sourceType
- summary
- sourceUrl
- collectedAt
- signalClass
- soWhatScore
properties:
  identifier:
    type: string
    pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
  sourceType:
    type: string
    enum:
    - x
    - youtube
    - paper
    - github
  summary:
    type: string
  sourceUrl:
    type: string
    format: uri
  skillVersion:
    type: string
  collectedAt:
    type: string
    format: date-time
  signalClass:
    type: string
    enum:
    - structural_anomaly
    - event_noise
  soWhatScore:
    type: number
    minimum: 0
    maximum: 1
example:
  identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
  sourceType: x
  summary: string
  sourceUrl: https://example.com/resource
  collectedAt: '2026-01-15T09:00:00Z'
  signalClass: structural_anomaly
  soWhatScore: 0.82
