post:
  tags:
  - Commands
  summary: 手動インサイト収集サイクル実行
  operationId: postCommandsRunInsightCycle
  requestBody:
    required: false
    content:
      application/json:
        schema:
          "$ref": "../components/schemas/index.yaml#/RunInsightCycleRequest"
        example:
          mode: manual
          targetDate: '2026-03-03'
          sourceTypes:
          - x
          - youtube
          - paper
          - github
          options:
            forceRecollect: false
            dryRun: false
            maxItemsPerSource: 200
  responses:
    '202':
      description: Accepted
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/CommandAccepted"
          example:
            accepted: true
            identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
            trace: 01ARZ3NDEKTSV4RRFFQ69G5FAV
    '409':
      "$ref": "../components/responses/index.yaml#/Conflict"
