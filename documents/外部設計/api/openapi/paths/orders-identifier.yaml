            side: BUY
            qty: 1.0
            status: FAILED
            createdAt: '2026-01-15T09:00:00Z'
            reasonCode: EXECUTION_BROKER_TIMEOUT
            trace: id-001
    '404':
      "$ref": "../components/responses/index.yaml#/NotFound"
