get:
  tags:
  - Compliance
  summary: コンプライアンス制御設定取得
  operationId: getComplianceControls
  responses:
    '200':
      description: Compliance controls
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/ComplianceControls"
          example:
            restrictedSymbols:
            - AAPL
            partnerRestrictedSymbols:
            - 7203.T
            blackoutWindows:
            - symbol: AAPL
              startAt: '2026-01-15T09:00:00Z'
              endAt: '2026-01-15T09:00:00Z'
              actionReasonCode: MANUAL_OPERATION
            sourcePolicies:
            - sourceType: youtube
              enabled: true
              termsVersion: v2026-03
              redistributionAllowed: false
              dailyQuota: 8000
              sourceConfig:
                youtube:
                  channelIdentifiers:
                  - UCvixJtaXuNdMPUGdOPcY8Ag
                  keywordQuery: 日本株 決算
                  includeLive: true
                  includeComments: true
                  maxCommentsPerVideo: 20
                  transcriptProvider: none
            maxCommentLength: 120
            autoPromotionEnabled: true
    '400':
      "$ref": "../components/responses/index.yaml#/BadRequest"
put:
  tags:
  - Compliance
  summary: コンプライアンス制御設定更新
  operationId: putComplianceControls
  requestBody:
    required: true
    content:
      application/json:
        schema:
          "$ref": "../components/schemas/index.yaml#/ComplianceControlsUpdate"
        example:
          restrictedSymbols:
          - AAPL
          partnerRestrictedSymbols:
          - 7203.T
          blackoutWindows:
          - symbol: AAPL
            startAt: '2026-01-15T09:00:00Z'
            endAt: '2026-01-15T09:00:00Z'
            actionReasonCode: MANUAL_OPERATION
          sourcePolicies:
          - sourceType: youtube
            enabled: true
            termsVersion: v2026-03
            redistributionAllowed: false
            dailyQuota: 8000
            sourceConfig:
              youtube:
                channelIdentifiers:
                - UCvixJtaXuNdMPUGdOPcY8Ag
                keywordQuery: 日本株 決算
                includeLive: true
                includeComments: true
                maxCommentsPerVideo: 20
                transcriptProvider: none
          maxCommentLength: 120
          autoPromotionEnabled: true
  responses:
    '200':
      description: Update result
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/OperationResult"
          example:
            success: true
            trace: 01ARZ3NDEKTSV4RRFFQ69G5FAV
    '400':
      "$ref": "../components/responses/index.yaml#/BadRequest"
