get:
  tags:
  - Hypotheses
  summary: 仮説一覧取得
  parameters:
  - in: query
    name: status
    schema:
      type: string
      enum:
      - draft
      - backtested
      - demo
      - live
      - rejected
  - "$ref": "../components/parameters/index.yaml#/Limit"
  - "$ref": "../components/parameters/index.yaml#/Cursor"
  responses:
    '200':
      description: Hypothesis list
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/HypothesisListResponse"
          example:
            items:
            - identifier: id-001
              status: draft
              updatedAt: '2026-01-15T09:00:00Z'
