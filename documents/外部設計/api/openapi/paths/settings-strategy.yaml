get:
  tags:
  - Settings
  summary: 戦略設定取得
  operationId: getSettingsStrategy
  responses:
    '200':
      description: Strategy settings
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/StrategySettings"
          example:
            market: JP
            rebalanceFrequency: daily
            symbols:
            - AAPL
            dailyLossLimit: 0.0
            positionConcentrationLimit: 0.0
            dailyOrderLimit: 1
    '400':
      "$ref": "../components/responses/index.yaml#/BadRequest"
put:
  tags:
  - Settings
  summary: 戦略設定更新
  operationId: putSettingsStrategy
  requestBody:
    required: true
    content:
      application/json:
        schema:
          "$ref": "../components/schemas/index.yaml#/StrategySettingsUpdate"
        example:
          market: JP
          rebalanceFrequency: daily
          symbols:
          - AAPL
          dailyLossLimit: 0.0
          positionConcentrationLimit: 0.0
          dailyOrderLimit: 1
  responses:
    '200':
      description: Update result
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/OperationResult"
          example:
            success: true
            trace: id-001
    '400':
      "$ref": "../components/responses/index.yaml#/BadRequest"
