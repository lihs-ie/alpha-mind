get:
  tags:
  - Orders
  summary: 注文一覧取得
  operationId: getOrders
  parameters:
  - "$ref": "../components/parameters/index.yaml#/OrderStatus"
  - "$ref": "../components/parameters/index.yaml#/Symbol"
  - "$ref": "../components/parameters/index.yaml#/From"
  - "$ref": "../components/parameters/index.yaml#/To"
  - "$ref": "../components/parameters/index.yaml#/Limit"
  - "$ref": "../components/parameters/index.yaml#/Cursor"
  responses:
    '200':
      description: Order list
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/OrderListResponse"
          example:
            items:
            - identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
              symbol: AAPL
              side: BUY
              qty: 1.0
              status: PROPOSED
              createdAt: '2026-01-15T09:00:00Z'
    '400':
      "$ref": "../components/responses/index.yaml#/BadRequest"
