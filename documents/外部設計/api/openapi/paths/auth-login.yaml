post:
  tags:
  - Auth
  summary: ログイン
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          "$ref": "../components/schemas/index.yaml#/LoginRequest"
        example:
          email: user@example.com
          password: P@ssw0rd123!
  responses:
    '200':
      description: Login success
      content:
        application/json:
          schema:
            "$ref": "../components/schemas/index.yaml#/LoginResponse"
          example:
            accessToken: string
            tokenType: Bearer
            expiresIn: 3600
            user:
              id: id-001
              email: user@example.com
              role: admin
              permissions:
              - string
    '401':
      "$ref": "../components/responses/index.yaml#/Unauthorized"
