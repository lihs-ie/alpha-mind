type: object
required:
- identifier
- symbol
- side
- qty
properties:
  identifier:
    type: string
    pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
  symbol:
    type: string
  side:
    type: string
    enum:
    - BUY
    - SELL
  qty:
    type: number
example:
  identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
  symbol: AAPL
  side: BUY
  qty: 1.0
