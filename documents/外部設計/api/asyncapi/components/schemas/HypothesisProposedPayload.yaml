type: object
required:
- identifier
- symbol
- instrumentType
- title
- sourceEvidence
- skillVersion
- instructionProfileVersion
properties:
  identifier:
    type: string
    pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
  symbol:
    type: string
  instrumentType:
    type: string
    enum:
    - ETF
    - STOCK
  insiderRisk:
    type: string
    enum:
    - low
    - medium
    - high
  title:
    type: string
  sourceEvidence:
    type: array
    items:
      type: string
  mnpiSelfDeclared:
    type: boolean
    default: false
  skillVersion:
    type: string
  instructionProfileVersion:
    type: string
example:
  identifier: 01ARZ3NDEKTSV4RRFFQ69G5FAV
  symbol: 1306.T
  instrumentType: ETF
  insiderRisk: low
  title: 低ボラETFの押し目反発仮説
  sourceEvidence:
  - insight-20260115-001
  mnpiSelfDeclared: false
  skillVersion: skill-cross-sectional@1.4.0
  instructionProfileVersion: conservative-jp-equity@2.1.0
