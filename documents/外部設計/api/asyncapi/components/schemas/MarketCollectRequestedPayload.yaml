type: object
required:
- targetDate
- requestedBy
properties:
  targetDate:
    type: string
    format: date
  requestedBy:
    type: string
    enum:
    - scheduler
    - user
  mode:
    type: string
    enum:
    - daily
    - manual
example:
  targetDate: '2026-01-15'
  requestedBy: scheduler
