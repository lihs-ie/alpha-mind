type: object
required:
- identifier
- decision
- reasonCode
- promotionMode
- mnpiSelfDeclared
- insiderRisk
properties:
  identifier:
    type: string
  decision:
    type: string
    enum:
    - promoted
    - rejected
  reasonCode:
    "$ref": "./index.yaml#/OperatorActionReasonCode"
  promotionMode:
    type: string
    enum:
    - manual
    - auto
  mnpiSelfDeclared:
    type: boolean
  insiderRisk:
    type: string
    enum:
    - low
    - medium
    - high
example:
  identifier: id-001
  decision: promoted
  reasonCode: AUTO_PROMOTION_POLICY_MATCH
  promotionMode: auto
  mnpiSelfDeclared: true
  insiderRisk: low
