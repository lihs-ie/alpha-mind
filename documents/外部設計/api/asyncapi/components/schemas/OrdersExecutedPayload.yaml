type: object
required:
- identifier
- brokerOrder
- executedAt
properties:
  identifier:
    type: string
    format: uuid
  brokerOrder:
    type: string
  executedAt:
    type: string
    format: date-time
example:
  identifier: 3fa85f64-5717-4562-b3fc-2c963f66afa6
  brokerOrder: id-001
  executedAt: '2026-01-15T09:00:00Z'
