type: object
required:
- reasonCode
properties:
  reasonCode:
    "$ref": "./index.yaml#/ReasonCode"
  detail:
    type: string
  sourceType:
    type: string
    enum:
    - x
    - youtube
    - paper
    - github
    - nisshokin
  stage:
    type: string
    enum:
    - validate_request
    - validate_policy
    - collect
    - normalize
    - persist
    - publish
  sourceIdentifier:
    type: string
  complianceContext:
    type: object
    properties:
      symbol:
        type: string
      policy:
        type: string
      requiresHumanReview:
        type: boolean
example:
  reasonCode: COMPLIANCE_SOURCE_UNAPPROVED
  detail: source policy is not approved
  sourceType: youtube
  stage: validate_policy
