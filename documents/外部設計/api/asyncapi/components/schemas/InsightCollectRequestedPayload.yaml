type: object
required:
- targetDate
- requestedBy
properties:
  targetDate:
    type: string
    format: date
  requestedBy:
    type: string
    enum:
    - scheduler
    - user
  sourceTypes:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
      - x
      - youtube
      - paper
      - github
  options:
    type: object
    properties:
      forceRecollect:
        type: boolean
        default: false
      dryRun:
        type: boolean
        default: false
      maxItemsPerSource:
        type: integer
        minimum: 1
        maximum: 2000
example:
  targetDate: '2026-01-15'
  requestedBy: scheduler
  sourceTypes:
  - x
  - youtube
  - paper
  - github
  options:
    forceRecollect: false
    dryRun: false
    maxItemsPerSource: 200
