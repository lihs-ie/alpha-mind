type: object
required:
- identifier
- eventType
- occurredAt
- trace
- schemaVersion
- payload
properties:
  identifier:
    type: string
    format: uuid
  eventType:
    type: string
  occurredAt:
    type: string
    format: date-time
  trace:
    type: string
  schemaVersion:
    type: string
    example: 1.0.0
  payload:
    type: object
    additionalProperties: true
example:
  identifier: 3fa85f64-5717-4562-b3fc-2c963f66afa6
  eventType: string
  occurredAt: '2026-01-15T09:00:00Z'
  trace: id-001
  schemaVersion: 1.0.0
  payload:
    key: value
