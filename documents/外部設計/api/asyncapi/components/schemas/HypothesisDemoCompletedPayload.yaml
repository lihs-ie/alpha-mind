type: object
required:
- identifier
- demoRun
- symbol
- instrumentType
- insiderRisk
- startedAt
- endedAt
- demoPeriodDays
- promotable
- requiresComplianceReview
- mnpiSelfDeclared
properties:
  identifier:
    type: string
  demoRun:
    type: string
  symbol:
    type: string
  instrumentType:
    type: string
    enum:
    - ETF
    - STOCK
  insiderRisk:
    type: string
    enum:
    - low
    - medium
    - high
  startedAt:
    type: string
    format: date-time
  endedAt:
    type: string
    format: date-time
  demoPeriodDays:
    type: integer
    minimum: 0
  promotable:
    type: boolean
  requiresComplianceReview:
    type: boolean
  mnpiSelfDeclared:
    type: boolean
  costAdjustedReturn:
    type: number
  dsr:
    type: number
  pbo:
    type: number
example:
  identifier: id-001
  demoRun: demo-20260115-001
  symbol: 1306.T
  instrumentType: ETF
  insiderRisk: low
  startedAt: '2025-12-01T00:00:00Z'
  endedAt: '2026-01-15T00:00:00Z'
  demoPeriodDays: 45
  promotable: true
  requiresComplianceReview: false
  mnpiSelfDeclared: true
  costAdjustedReturn: 4.2
  dsr: 1.14
  pbo: 0.08
