type: object
required:
- identifier
- demoRun
- startedAt
- endedAt
- promotable
properties:
  identifier:
    type: string
  demoRun:
    type: string
  startedAt:
    type: string
    format: date-time
  endedAt:
    type: string
    format: date-time
  promotable:
    type: boolean
  costAdjustedReturn:
    type: number
  dsr:
    type: number
  pbo:
    type: number
example:
  identifier: id-001
  demoRun: demo-20260115-001
  startedAt: '2025-12-01T00:00:00Z'
  endedAt: '2026-01-15T00:00:00Z'
  promotable: true
  costAdjustedReturn: 4.2
  dsr: 1.14
  pbo: 0.08
