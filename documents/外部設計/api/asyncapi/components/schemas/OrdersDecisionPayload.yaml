type: object
required:
- identifier
- decision
properties:
  identifier:
    type: string
    format: uuid
  decision:
    type: string
    enum:
    - approved
    - rejected
  reasonCode:
    "$ref": "./index.yaml#/ReasonCode"
  actionReasonCode:
    "$ref": "./index.yaml#/OperatorActionReasonCode"
allOf:
- if:
    properties:
      decision:
        const: rejected
  then:
    required:
    - reasonCode
example:
  identifier: 3fa85f64-5717-4562-b3fc-2c963f66afa6
  decision: approved
  actionReasonCode: MANUAL_OPERATION
