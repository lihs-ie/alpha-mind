asyncapi: 3.1.0
id: urn:alpha-mind:external-design:event-contract
info:
  title: Investment AI Event Contract
  version: 1.1.0
  description: |
    AI投資運用アプリのイベント契約定義（Pub/Sub想定）。
    CloudEvents互換の共通エンベロープを使用する。
  contact:
    name: Alpha Mind Team
  license:
    name: Proprietary
defaultContentType: application/json
servers:
  gcpPubSub:
    host: pubsub.googleapis.com
    protocol: googlepubsub
    description: Google Cloud Pub/Sub
