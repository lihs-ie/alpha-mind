openapi: 3.0.3
info:
  title: Investment AI BFF API
  version: 1.1.0
  description: |
    AI投資運用アプリのBFF向けOpenAPI定義。
    画面外部設計（SCR-000〜SCR-007）とサービス外部設計を基に作成。
servers:
- url: https://api.example.com
  description: production
- url: https://staging-api.example.com
  description: staging
tags:
- name: Health
- name: Auth
- name: Dashboard
- name: Operations
- name: Commands
- name: Settings
- name: Compliance
- name: Orders
- name: Audit
- name: Models
- name: Insights
- name: Hypotheses
security:
- bearerAuth: []
paths:
  /healthz:
    $ref: "./openapi/paths/healthz.yaml"
  /auth/login:
    $ref: "./openapi/paths/auth-login.yaml"
  /dashboard/summary:
    $ref: "./openapi/paths/dashboard-summary.yaml"
  /operations/runtime:
    $ref: "./openapi/paths/operations-runtime.yaml"
  /operations/kill-switch:
    $ref: "./openapi/paths/operations-kill-switch.yaml"
  /commands/run-cycle:
    $ref: "./openapi/paths/commands-run-cycle.yaml"
  /commands/run-insight-cycle:
    $ref: "./openapi/paths/commands-run-insight-cycle.yaml"
  /settings/strategy:
    $ref: "./openapi/paths/settings-strategy.yaml"
  /compliance/controls:
    $ref: "./openapi/paths/compliance-controls.yaml"
  /orders:
    $ref: "./openapi/paths/orders.yaml"
  /orders/{identifier}:
    $ref: "./openapi/paths/orders-identifier.yaml"
  /orders/{identifier}/approve:
    $ref: "./openapi/paths/orders-identifier-approve.yaml"
  /orders/{identifier}/reject:
    $ref: "./openapi/paths/orders-identifier-reject.yaml"
  /orders/{identifier}/retry:
    $ref: "./openapi/paths/orders-identifier-retry.yaml"
  /audit:
    $ref: "./openapi/paths/audit.yaml"
  /audit/{identifier}:
    $ref: "./openapi/paths/audit-identifier.yaml"
  /insights:
    $ref: "./openapi/paths/insights.yaml"
  /hypotheses:
    $ref: "./openapi/paths/hypotheses.yaml"
  /hypotheses/{identifier}/retest:
    $ref: "./openapi/paths/hypotheses-identifier-retest.yaml"
  /models/validation:
    $ref: "./openapi/paths/models-validation.yaml"
  /models/validation/{modelVersion}:
    $ref: "./openapi/paths/models-validation-modelVersion.yaml"
  /models/validation/{modelVersion}/approve:
    $ref: "./openapi/paths/models-validation-modelVersion-approve.yaml"
  /models/validation/{modelVersion}/reject:
    $ref: "./openapi/paths/models-validation-modelVersion-reject.yaml"
