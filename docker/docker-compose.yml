name: alpha-mind-local

networks:
  alpha-mind-network:
    driver: bridge

services:
  # =========================================================================
  # GCP Emulators
  # =========================================================================

  firestore:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.firestore-emulator
    # Java 21 を含むカスタムイメージを使用する（google/cloud-sdk:558.0.0 には Java 未同梱）
    ports:
      - "8080:8080"
    networks:
      - alpha-mind-network
    environment:
      CLOUDSDK_CORE_PROJECT: alpha-mind-local
      GCP_PROJECT_ID: alpha-mind-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  pubsub:
    image: google/cloud-sdk:558.0.0
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=alpha-mind-local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8085:8085"
    networks:
      - alpha-mind-network
    environment:
      CLOUDSDK_CORE_PROJECT: alpha-mind-local
    healthcheck:
      test: ["CMD", "curl", "--http1.1", "-f", "http://localhost:8085/v1/projects/alpha-mind-local/topics"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  gcs:
    image: fsouza/fake-gcs-server:1.54.0
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory"]
    ports:
      - "4443:4443"
    networks:
      - alpha-mind-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4443/storage/v1/b"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # =========================================================================
  # Init container: エミュレータ起動後にトピック/バケット/シードを投入する
  # =========================================================================

  init:
    image: google/cloud-sdk:558.0.0
    depends_on:
      firestore:
        condition: service_healthy
      pubsub:
        condition: service_healthy
      gcs:
        condition: service_healthy
    networks:
      - alpha-mind-network
    environment:
      GCP_PROJECT_ID: alpha-mind-local
      FIRESTORE_EMULATOR_HOST: firestore:8080
      PUBSUB_EMULATOR_HOST: pubsub:8085
      STORAGE_EMULATOR_HOST: http://gcs:4443
      FIRESTORE_DATABASE: "(default)"
      PUBSUB_DEAD_LETTER_MAX_DELIVERY_ATTEMPTS: ${PUBSUB_DEAD_LETTER_MAX_DELIVERY_ATTEMPTS:-3}
      PUBSUB_RETRY_MINIMUM_BACKOFF: ${PUBSUB_RETRY_MINIMUM_BACKOFF:-10s}
      PUBSUB_RETRY_MAXIMUM_BACKOFF: ${PUBSUB_RETRY_MAXIMUM_BACKOFF:-600s}
    volumes:
      - ./scripts:/scripts:ro
    # jq が必要なため apt-get でインストールしてからスクリプトを実行する
    entrypoint: >
      bash -c "
        apt-get update > /dev/null 2>&1 &&
        apt-get install -y --no-install-recommends jq curl > /dev/null 2>&1 &&
        bash /scripts/init-pubsub.sh &&
        bash /scripts/init-firestore.sh &&
        bash /scripts/init-gcs.sh &&
        echo '==> All initialization complete.'
      "
    restart: "no"

  # =========================================================================
  # Application Services
  # =========================================================================

  # NOTE: frontend のビルドには applications/frontend/ が必要。
  # リポジトリに含まれないため、profile で分離し明示起動とする。
  # 起動方法: docker compose --profile frontend up
  frontend:
    profiles: [frontend]
    platform: linux/amd64
    build:
      context: ../
      dockerfile: docker/dockerfiles/Dockerfile.frontend
    ports:
      - "3000:8080"
    networks:
      - alpha-mind-network
    environment:
      APP_ENV: local
      PORT: "8080"
      BFF_BASE_URL: http://bff:8080
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bff:
    build:
      context: ../
      dockerfile: docker/dockerfiles/Dockerfile.haskell
      args:
        SERVICE_NAME: bff
    ports:
      - "3001:8080"
    networks:
      - alpha-mind-network
    environment:
      APP_ENV: local
      PORT: "8080"
      GCP_PROJECT_ID: alpha-mind-local
      GCP_REGION: asia-northeast1
      FIRESTORE_EMULATOR_HOST: firestore:8080
      FIRESTORE_DATABASE: "(default)"
      PUBSUB_EMULATOR_HOST: pubsub:8085
      PUBSUB_TOPIC_PREFIX: "event-"
      # presentation 層 (#16) が App.Bootstrap / buildAppEnv で要求する必須 env
      SERVICE_VERSION: "0.1.0"
      # JWT signing (HS256, MVP)
      JWT_SECRET_KEY: "local-jwt-secret-key-for-development-only-placeholder"
      JWT_ISSUER_URL: "https://alpha-mind.local"
      JWT_AUDIENCE_URL: "https://api.alpha-mind.local"
      # MVP 単一管理者ユーザー認証
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "local-admin-password-placeholder"
      # BFF は risk-guard を直接HTTP呼び出しする（INF-003 roles/run.invoker）
      RISK_GUARD_BASE_URL: http://risk-guard:8080
      # OIDCは localでは無効化（プレースホルダー）
      OIDC_CLIENT_SECRET: "local-oidc-client-secret-placeholder"
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NOTE: STG設計では Cloud Run Job だが、ローカルではHTTPサービスとして起動する
  data-collector:
    build:
      context: ../
      dockerfile: docker/dockerfiles/Dockerfile.haskell
      args:
        SERVICE_NAME: data-collector
    ports:
      - "3002:8080"
    networks:
      - alpha-mind-network
    environment:
      APP_ENV: local
      PORT: "8080"
      GCP_PROJECT_ID: alpha-mind-local
      GCP_REGION: asia-northeast1
      FIRESTORE_EMULATOR_HOST: firestore:8080
      FIRESTORE_DATABASE: "(default)"
      FIRESTORE_DATABASE_ID: "(default)"
      PUBSUB_EMULATOR_HOST: pubsub:8085
      PUBSUB_TOPIC_PREFIX: "event-"
      STORAGE_EMULATOR_HOST: http://gcs:4443
      # presentation 層 (#28) が App.Bootstrap / buildAppEnv で要求する必須 env
      SERVICE_VERSION: "0.1.0"
      GCS_BUCKET_NAME: "alpha-mind-market-data-local"
      PUBSUB_MARKET_COLLECTED_TOPIC: "market.collected"
      PUBSUB_MARKET_COLLECT_FAILED_TOPIC: "market.collect.failed"
      # 外部APIキーはローカルではプレースホルダーを使用する（buildAppEnv が読むキー名）
      JQUANTS_ID_TOKEN: "local-jquants-id-token-placeholder"
      ALPACA_API_KEY_ID: "local-alpaca-api-key-id-placeholder"
      ALPACA_API_SECRET_KEY: "local-alpaca-api-secret-key-placeholder"
      ALPACA_US_COLLECTION_ENABLED: "false"
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NOTE: STG設計では Cloud Run Job だが、ローカルではHTTPサービスとして起動する
