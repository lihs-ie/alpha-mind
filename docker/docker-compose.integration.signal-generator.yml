services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root mlflow-artifacts:/
        --serve-artifacts
    ports:
      - "5050:5000"
    networks:
      - alpha-mind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  signal-generator:
    extends:
      file: ./docker-compose.yml
      service: signal-generator
    ports: !reset []
